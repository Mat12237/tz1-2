<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitAdmin — Управление фитнес-центром</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --surface2: #f0efe9;
    --border: rgba(0,0,0,0.1);
    --border2: rgba(0,0,0,0.18);
    --text: #1a1a18;
    --muted: #6b6b67;
    --accent: #2a6e4e;
    --accent-bg: #e1f0e9;
    --accent-text: #1a4832;
    --danger: #c0392b;
    --danger-bg: #fcecea;
    --warn: #a05c00;
    --warn-bg: #fef3e2;
    --info: #1a5fa8;
    --info-bg: #e6f0fb;
    --radius: 10px;
    --radius-sm: 6px;
    --shadow: 0 1px 3px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.05);
  }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }

  /* Layout */
  .layout { display: flex; min-height: 100vh; }

  /* Sidebar */
  .sidebar {
    width: 220px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0; left: 0; bottom: 0;
    z-index: 100;
  }
  .sidebar-logo {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-logo .logo-mark {
    display: flex; align-items: center; gap: 10px;
  }
  .logo-icon {
    width: 32px; height: 32px; background: var(--accent);
    border-radius: 8px; display: flex; align-items: center;
    justify-content: center; color: #fff; font-size: 16px; font-weight: 700;
  }
  .logo-text { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }
  .logo-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }

  .sidebar-nav { padding: 12px 10px; flex: 1; }
  .nav-section { margin-bottom: 20px; }
  .nav-label {
    font-size: 10px; font-weight: 600; letter-spacing: 0.8px;
    color: var(--muted); text-transform: uppercase;
    padding: 0 10px; margin-bottom: 4px;
  }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px; border-radius: var(--radius-sm);
    cursor: pointer; color: var(--muted); font-size: 13.5px;
    transition: all 0.15s; border: none; background: none;
    width: 100%; text-align: left;
  }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: var(--accent-bg); color: var(--accent-text); font-weight: 500; }
  .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }
  .nav-badge {
    margin-left: auto; background: var(--surface2);
    border-radius: 20px; padding: 1px 7px;
    font-size: 11px; font-weight: 600; color: var(--muted);
  }
  .nav-item.active .nav-badge { background: rgba(42,110,78,0.15); color: var(--accent); }

  /* Main */
  .main { margin-left: 220px; flex: 1; }

  /* Topbar */
  .topbar {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 0 24px; height: 56px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 50;
  }
  .topbar-title { font-size: 16px; font-weight: 600; letter-spacing: -0.3px; }
  .topbar-actions { display: flex; align-items: center; gap: 10px; }

  /* Content */
  .content { padding: 24px; max-width: 1100px; }

  /* Stats row */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px; margin-bottom: 24px;
  }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px 18px;
  }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .stat-value { font-size: 26px; font-weight: 600; letter-spacing: -0.5px; }
  .stat-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .stat-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 4px; }

  /* Toolbar */
  .toolbar {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 16px; flex-wrap: wrap;
  }
  .search-box {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 0 12px; height: 34px; flex: 1; min-width: 200px;
  }
  .search-box svg { color: var(--muted); width: 14px; height: 14px; flex-shrink: 0; }
  .search-box input {
    border: none; outline: none; background: none;
    font-size: 13px; color: var(--text); width: 100%;
  }
  .search-box input::placeholder { color: var(--muted); }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 0 14px; height: 34px; border-radius: var(--radius-sm);
    font-size: 13px; font-weight: 500; cursor: pointer;
    border: 1px solid var(--border2); background: var(--surface);
    color: var(--text); transition: all 0.15s; white-space: nowrap;
  }
  .btn:hover { background: var(--surface2); }
  .btn:active { transform: scale(0.98); }
  .btn svg { width: 14px; height: 14px; }
  .btn-primary { background: var(--accent); color: #fff; border-color: transparent; }
  .btn-primary:hover { background: #235f42; }
  .btn-danger { background: var(--danger-bg); color: var(--danger); border-color: transparent; }
  .btn-danger:hover { background: #f5d0cc; }
  .btn-sm { height: 28px; padding: 0 10px; font-size: 12px; }

  /* Table */
  .table-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden;
  }
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  thead { background: var(--surface2); }
  th {
    padding: 10px 14px; text-align: left; font-size: 11px;
    font-weight: 600; color: var(--muted); text-transform: uppercase;
    letter-spacing: 0.5px; border-bottom: 1px solid var(--border); white-space: nowrap;
  }
  td { padding: 12px 14px; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--surface2); }

  .avatar {
    width: 30px; height: 30px; border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600; flex-shrink: 0;
  }
  .cell-name { display: flex; align-items: center; gap: 10px; }
  .cell-name-text .name { font-weight: 500; }
  .cell-name-text .sub { font-size: 11px; color: var(--muted); }

  /* Badges */
  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 8px; border-radius: 20px;
    font-size: 11px; font-weight: 600; white-space: nowrap;
  }
  .badge-active { background: var(--accent-bg); color: var(--accent-text); }
  .badge-inactive { background: var(--surface2); color: var(--muted); }
  .badge-working { background: var(--accent-bg); color: var(--accent-text); }
  .badge-leave { background: var(--warn-bg); color: var(--warn); }
  .badge-notworking { background: var(--danger-bg); color: var(--danger); }

  /* Row actions */
  .row-actions { display: flex; gap: 6px; opacity: 0; transition: opacity 0.15s; }
  tr:hover .row-actions { opacity: 1; }

  /* Empty state */
  .empty {
    padding: 48px 24px; text-align: center; color: var(--muted);
  }
  .empty svg { width: 40px; height: 40px; margin-bottom: 12px; opacity: 0.3; }
  .empty p { font-size: 13px; }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.35);
    z-index: 200;
    display: none; align-items: center; justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface); border-radius: var(--radius);
    width: 100%; max-width: 480px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    overflow: hidden;
    animation: modalIn 0.2s ease;
  }
  @keyframes modalIn { from { transform: translateY(12px) scale(0.98); opacity: 0; } to { transform: none; opacity: 1; } }
  .modal-header {
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-title { font-size: 15px; font-weight: 600; }
  .modal-close {
    width: 28px; height: 28px; border-radius: var(--radius-sm);
    border: none; background: var(--surface2); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted); font-size: 16px;
  }
  .modal-close:hover { background: var(--border); }
  .modal-body { padding: 18px 20px; }
  .modal-footer {
    padding: 14px 20px; border-top: 1px solid var(--border);
    display: flex; justify-content: flex-end; gap: 8px;
  }

  /* Form */
  .form-grid { display: grid; gap: 14px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-label { font-size: 12px; font-weight: 500; color: var(--muted); }
  .form-label .req { color: var(--danger); }
  .form-control {
    height: 36px; padding: 0 10px;
    border: 1px solid var(--border2); border-radius: var(--radius-sm);
    background: var(--surface); color: var(--text); font-size: 13px;
    outline: none; transition: border-color 0.15s; width: 100%;
  }
  .form-control:focus { border-color: var(--accent); }
  .form-control.error { border-color: var(--danger); }
  select.form-control { cursor: pointer; }
  .form-error { font-size: 11px; color: var(--danger); }

  /* Detail panel */
  .detail-panel {
    position: fixed; top: 0; right: 0; bottom: 0;
    width: 360px; background: var(--surface);
    border-left: 1px solid var(--border);
    z-index: 150; transform: translateX(100%);
    transition: transform 0.25s cubic-bezier(.4,0,.2,1);
    overflow-y: auto;
  }
  .detail-panel.open { transform: none; }
  .detail-header {
    padding: 18px 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; background: var(--surface); z-index: 1;
  }
  .detail-title { font-size: 14px; font-weight: 600; color: var(--muted); }
  .detail-body { padding: 20px; }
  .detail-avatar {
    width: 56px; height: 56px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 600; margin-bottom: 12px;
  }
  .detail-name { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }
  .detail-sub { font-size: 13px; color: var(--muted); margin-bottom: 20px; }
  .detail-section { margin-bottom: 20px; }
  .detail-section-title {
    font-size: 10px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.8px; color: var(--muted); margin-bottom: 10px;
  }
  .detail-field { display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .detail-field:last-child { border-bottom: none; }
  .detail-field-label { color: var(--muted); }
  .detail-field-value { font-weight: 500; text-align: right; max-width: 200px; word-break: break-all; }

  .client-chip {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 10px; border-radius: var(--radius-sm);
    border: 1px solid var(--border); margin-bottom: 6px; font-size: 13px;
  }
  .client-chip .chip-name { font-weight: 500; }
  .client-chip .chip-sub { font-size: 11px; color: var(--muted); }

  /* Toast */
  .toast-container {
    position: fixed; bottom: 24px; right: 24px; z-index: 999;
    display: flex; flex-direction: column; gap: 8px;
  }
  .toast {
    background: var(--text); color: #fff;
    padding: 10px 16px; border-radius: var(--radius-sm);
    font-size: 13px; animation: toastIn 0.2s ease;
    max-width: 280px;
  }
  .toast.success { background: var(--accent); }
  .toast.error { background: var(--danger); }
  @keyframes toastIn { from { transform: translateY(8px); opacity: 0; } to { transform: none; opacity: 1; } }

  /* Page views */
  .page { display: none; }
  .page.active { display: block; }

  /* Loading */
  .loading { padding: 48px; text-align: center; color: var(--muted); font-size: 13px; }
  .spinner {
    display: inline-block; width: 20px; height: 20px;
    border: 2px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.7s linear infinite; margin-bottom: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">
        <div class="logo-icon">F</div>
        <div>
          <div class="logo-text">FitAdmin</div>
          <div class="logo-sub">Фитнес-центр</div>
        </div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">
        <div class="nav-label">Главное</div>
        <button class="nav-item active" data-page="clients" onclick="showPage('clients')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          Клиенты
          <span class="nav-badge" id="nav-clients-count">0</span>
        </button>
        <button class="nav-item" data-page="trainers" onclick="showPage('trainers')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="5"/><path d="M3 21a9 9 0 0 1 18 0"/></svg>
          Тренеры
          <span class="nav-badge" id="nav-trainers-count">0</span>
        </button>
      </div>
    </nav>
  </aside>

  <!-- Main -->
  <div class="main">
    <!-- Topbar -->
    <header class="topbar">
      <div class="topbar-title" id="topbar-title">Клиенты</div>
      <div class="topbar-actions">
        <button class="btn btn-primary" id="add-btn" onclick="openAddModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Добавить
        </button>
      </div>
    </header>

    <div class="content">

      <!-- CLIENTS PAGE -->
      <div class="page active" id="page-clients">
        <div class="stats-grid" id="client-stats"></div>
        <div class="toolbar">
          <div class="search-box">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" placeholder="Поиск клиентов..." id="client-search" oninput="filterClients()">
          </div>
          <select class="btn" id="client-filter-status" onchange="filterClients()" style="cursor:pointer">
            <option value="">Все статусы</option>
            <option value="active">Активные</option>
            <option value="inactive">Неактивные</option>
          </select>
        </div>
        <div class="table-card">
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Клиент</th>
                  <th>Телефон</th>
                  <th>Email</th>
                  <th>Дата рождения</th>
                  <th>Тренер</th>
                  <th>Статус</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="clients-tbody">
                <tr><td colspan="7"><div class="loading"><div class="spinner"></div><br>Загрузка...</div></td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- TRAINERS PAGE -->
      <div class="page" id="page-trainers">
        <div class="stats-grid" id="trainer-stats"></div>
        <div class="toolbar">
          <div class="search-box">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" placeholder="Поиск тренеров..." id="trainer-search" oninput="filterTrainers()">
          </div>
          <select class="btn" id="trainer-filter-status" onchange="filterTrainers()" style="cursor:pointer">
            <option value="">Все статусы</option>
            <option value="WORKING">Работает</option>
            <option value="ON_LEAVE">В отпуске</option>
            <option value="NOT_WORKING">Не работает</option>
          </select>
        </div>
        <div class="table-card">
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Тренер</th>
                  <th>Телефон</th>
                  <th>Статус</th>
                  <th>Клиенты</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="trainers-tbody">
                <tr><td colspan="5"><div class="loading"><div class="spinner"></div><br>Загрузка...</div></td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Detail Panel -->
<div class="detail-panel" id="detail-panel">
  <div class="detail-header">
    <span class="detail-title" id="detail-panel-title">Подробности</span>
    <button class="modal-close" onclick="closeDetail()">✕</button>
  </div>
  <div class="detail-body" id="detail-body"></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModalOnBg(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">Добавить</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Отмена</button>
      <button class="btn btn-primary" id="modal-submit" onclick="submitModal()">Сохранить</button>
    </div>
  </div>
</div>

<!-- Toast container -->
<div class="toast-container" id="toasts"></div>

<script>
const API = 'http://localhost:3000/api';
let currentPage = 'clients';
let allClients = [];
let allTrainers = [];
let modalMode = null; // 'add-client' | 'edit-client' | 'add-trainer' | 'edit-trainer' | 'assign-trainer' | 'change-status-trainer'
let editingId = null;

// ── Utilities ──────────────────────────────────────────────────────────────

function toast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function avatar(surname, name, seed) {
  const colors = [
    ['#e1f0e9','#1a4832'],['#e6f0fb','#0c447c'],['#fef3e2','#854f0b'],
    ['#fbeaf0','#72243e'],['#eeedfe','#3c3489'],['#faeeda','#633806'],
  ];
  const i = (seed || (surname + name)).charCodeAt(0) % colors.length;
  const [bg, color] = colors[i];
  const initials = (surname[0] || '') + (name[0] || '');
  return { bg, color, initials };
}

function fmtDate(d) {
  if (!d) return '—';
  const [y, m, day] = d.split('-');
  return `${day}.${m}.${y}`;
}

function fullName(p) {
  return [p.surname, p.name, p.patronymic].filter(Boolean).join(' ');
}

function trainerStatusBadge(status) {
  const map = {
    WORKING: ['badge-working', 'Работает'],
    ON_LEAVE: ['badge-leave', 'В отпуске'],
    NOT_WORKING: ['badge-notworking', 'Не работает'],
  };
  const [cls, label] = map[status] || ['badge-inactive', status];
  return `<span class="badge ${cls}">${label}</span>`;
}

// ── API calls ──────────────────────────────────────────────────────────────

async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(API + path, opts);
  const data = await r.json();
  if (!r.ok) throw { status: r.status, data };
  return data;
}

// ── Load data ──────────────────────────────────────────────────────────────

async function loadClients() {
  allClients = await api('GET', '/clients');
  document.getElementById('nav-clients-count').textContent = allClients.length;
  renderClientStats();
  filterClients();
}

async function loadTrainers() {
  allTrainers = await api('GET', '/trainers');
  document.getElementById('nav-trainers-count').textContent = allTrainers.length;
  renderTrainerStats();
  filterTrainers();
}

async function loadAll() {
  await Promise.all([loadClients(), loadTrainers()]);
}

// ── Stats ──────────────────────────────────────────────────────────────────

function renderClientStats() {
  const active = allClients.filter(c => c.is_active).length;
  const inactive = allClients.length - active;
  const withTrainer = allClients.filter(c => c.trainer_id).length;
  document.getElementById('client-stats').innerHTML = `
    <div class="stat-card">
      <div class="stat-label">Всего клиентов</div>
      <div class="stat-value">${allClients.length}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Активных</div>
      <div class="stat-value" style="color:var(--accent)">${active}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Неактивных</div>
      <div class="stat-value" style="color:var(--muted)">${inactive}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">С тренером</div>
      <div class="stat-value">${withTrainer}</div>
    </div>
  `;
}

function renderTrainerStats() {
  const working = allTrainers.filter(t => t.status === 'WORKING').length;
  const leave = allTrainers.filter(t => t.status === 'ON_LEAVE').length;
  const notWorking = allTrainers.filter(t => t.status === 'NOT_WORKING').length;
  document.getElementById('trainer-stats').innerHTML = `
    <div class="stat-card">
      <div class="stat-label">Всего тренеров</div>
      <div class="stat-value">${allTrainers.length}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Работает</div>
      <div class="stat-value" style="color:var(--accent)">${working}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">В отпуске</div>
      <div class="stat-value" style="color:var(--warn)">${leave}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Не работает</div>
      <div class="stat-value" style="color:var(--muted)">${notWorking}</div>
    </div>
  `;
}

// ── Render tables ──────────────────────────────────────────────────────────

function filterClients() {
  const q = document.getElementById('client-search').value.toLowerCase();
  const s = document.getElementById('client-filter-status').value;
  let list = allClients.filter(c => {
    const match = fullName(c).toLowerCase().includes(q) ||
      (c.email || '').toLowerCase().includes(q) ||
      (c.phone || '').includes(q);
    const statusOk = !s ||
      (s === 'active' && c.is_active) ||
      (s === 'inactive' && !c.is_active);
    return match && statusOk;
  });
  renderClientsTable(list);
}

function filterTrainers() {
  const q = document.getElementById('trainer-search').value.toLowerCase();
  const s = document.getElementById('trainer-filter-status').value;
  let list = allTrainers.filter(t => {
    const match = fullName(t).toLowerCase().includes(q) || (t.phone || '').includes(q);
    const statusOk = !s || t.status === s;
    return match && statusOk;
  });
  renderTrainersTable(list);
}

function renderClientsTable(list) {
  const tbody = document.getElementById('clients-tbody');
  if (!list.length) {
    tbody.innerHTML = `<tr><td colspan="7"><div class="empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="8" r="5"/><path d="M3 21a9 9 0 0 1 18 0"/></svg>
      <p>Клиентов не найдено</p></div></td></tr>`;
    return;
  }
  tbody.innerHTML = list.map(c => {
    const av = avatar(c.surname, c.name);
    const trainer = allTrainers.find(t => t.id === c.trainer_id);
    return `<tr>
      <td>
        <div class="cell-name">
          <div class="avatar" style="background:${av.bg};color:${av.color}">${av.initials}</div>
          <div class="cell-name-text">
            <div class="name">${fullName(c)}</div>
          </div>
        </div>
      </td>
      <td>${c.phone}</td>
      <td style="color:var(--info)">${c.email}</td>
      <td>${fmtDate(c.birthday)}</td>
      <td>${trainer ? `<span style="font-size:12px;color:var(--accent-text)">${trainer.surname} ${trainer.name[0]}.${trainer.patronymic ? trainer.patronymic[0]+'.' : ''}</span>` : '<span style="color:var(--muted);font-size:12px">Не назначен</span>'}</td>
      <td><span class="badge ${c.is_active ? 'badge-active' : 'badge-inactive'}">${c.is_active ? 'Активен' : 'Неактивен'}</span></td>
      <td>
        <div class="row-actions">
          <button class="btn btn-sm" onclick="openDetail('client','${c.id}')" title="Подробнее">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
          <button class="btn btn-sm" onclick="openEditClient('${c.id}')" title="Редактировать">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          <button class="btn btn-sm" onclick="toggleClientStatus('${c.id}', ${c.is_active})" title="${c.is_active ? 'Деактивировать' : 'Активировать'}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><path d="M18.36 6.64A9 9 0 0 1 20.77 15"/><path d="M6.16 6.16a9 9 0 1 0 12.68 12.68"/><line x1="2" y1="2" x2="22" y2="22"/></svg>
          </button>
        </div>
      </td>
    </tr>`;
  }).join('');
}

function renderTrainersTable(list) {
  const tbody = document.getElementById('trainers-tbody');
  if (!list.length) {
    tbody.innerHTML = `<tr><td colspan="5"><div class="empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="8" r="5"/><path d="M3 21a9 9 0 0 1 18 0"/></svg>
      <p>Тренеров не найдено</p></div></td></tr>`;
    return;
  }
  tbody.innerHTML = list.map(t => {
    const av = avatar(t.surname, t.name);
    const clientCount = allClients.filter(c => c.trainer_id === t.id).length;
    return `<tr>
      <td>
        <div class="cell-name">
          <div class="avatar" style="background:${av.bg};color:${av.color}">${av.initials}</div>
          <div class="cell-name-text">
            <div class="name">${fullName(t)}</div>
          </div>
        </div>
      </td>
      <td>${t.phone}</td>
      <td>${trainerStatusBadge(t.status)}</td>
      <td><span style="font-weight:500">${clientCount}</span> <span style="color:var(--muted);font-size:12px">чел.</span></td>
      <td>
        <div class="row-actions">
          <button class="btn btn-sm" onclick="openDetail('trainer','${t.id}')" title="Подробнее">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
          <button class="btn btn-sm" onclick="openEditTrainer('${t.id}')" title="Редактировать">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          <button class="btn btn-sm" onclick="openChangeStatus('${t.id}')" title="Изменить статус">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-.08-9.91"/></svg>
          </button>
        </div>
      </td>
    </tr>`;
  }).join('');
}

// ── Detail panel ───────────────────────────────────────────────────────────

async function openDetail(type, id) {
  const panel = document.getElementById('detail-panel');
  document.getElementById('detail-panel-title').textContent = type === 'client' ? 'Карточка клиента' : 'Карточка тренера';
  document.getElementById('detail-body').innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  panel.classList.add('open');

  try {
    const data = await api('GET', `/${type}s/${id}/detail`);
    renderDetailBody(type, data);
  } catch(e) {
    document.getElementById('detail-body').innerHTML = '<div class="empty"><p>Ошибка загрузки</p></div>';
  }
}

function renderDetailBody(type, data) {
  const av = avatar(data.surname, data.name);
  let html = `
    <div class="detail-avatar" style="background:${av.bg};color:${av.color}">${av.initials}</div>
    <div class="detail-name">${fullName(data)}</div>
    <div class="detail-sub">${type === 'client' ? 'Клиент' : 'Тренер'}</div>
  `;

  if (type === 'client') {
    html += `
      <div class="detail-section">
        <div class="detail-section-title">Контакты</div>
        <div class="detail-field"><span class="detail-field-label">Телефон</span><span class="detail-field-value">${data.phone}</span></div>
        <div class="detail-field"><span class="detail-field-label">Email</span><span class="detail-field-value" style="color:var(--info)">${data.email}</span></div>
        <div class="detail-field"><span class="detail-field-label">Дата рождения</span><span class="detail-field-value">${fmtDate(data.birthday)}</span></div>
        <div class="detail-field"><span class="detail-field-label">Статус</span><span class="detail-field-value"><span class="badge ${data.is_active ? 'badge-active':'badge-inactive'}">${data.is_active?'Активен':'Неактивен'}</span></span></div>
      </div>
    `;
    if (data.trainer) {
      const tav = avatar(data.trainer.surname, data.trainer.name);
      html += `
        <div class="detail-section">
          <div class="detail-section-title">Тренер</div>
          <div class="client-chip">
            <div class="avatar" style="background:${tav.bg};color:${tav.color};width:28px;height:28px;font-size:10px">${tav.initials}</div>
            <div>
              <div class="chip-name">${fullName(data.trainer)}</div>
              <div class="chip-sub">${trainerStatusBadge(data.trainer.status)}</div>
            </div>
          </div>
        </div>
      `;
    } else {
      html += `
        <div class="detail-section">
          <div class="detail-section-title">Тренер</div>
          <button class="btn" style="width:100%" onclick="openAssignTrainer('${data.id}')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Назначить тренера
          </button>
        </div>
      `;
    }
  } else {
    html += `
      <div class="detail-section">
        <div class="detail-section-title">Информация</div>
        <div class="detail-field"><span class="detail-field-label">Телефон</span><span class="detail-field-value">${data.phone}</span></div>
        <div class="detail-field"><span class="detail-field-label">Статус</span><span class="detail-field-value">${trainerStatusBadge(data.status)}</span></div>
      </div>
    `;
    const clients = data.clients || [];
    html += `
      <div class="detail-section">
        <div class="detail-section-title">Клиенты (${clients.length})</div>
        ${clients.length === 0 ? '<p style="color:var(--muted);font-size:13px">Нет клиентов</p>' :
          clients.map(c => {
            const cav = avatar(c.surname, c.name);
            return `<div class="client-chip">
              <div class="avatar" style="background:${cav.bg};color:${cav.color};width:28px;height:28px;font-size:10px">${cav.initials}</div>
              <div>
                <div class="chip-name">${fullName(c)}</div>
                <div class="chip-sub">${c.is_active ? 'Активен' : 'Неактивен'} · ${c.email}</div>
              </div>
            </div>`;
          }).join('')
        }
      </div>
    `;
  }

  document.getElementById('detail-body').innerHTML = html;
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('open');
}

// ── Modals ─────────────────────────────────────────────────────────────────

function openModal() { document.getElementById('modal-overlay').classList.add('open'); }
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); editingId = null; }
function closeModalOnBg(e) { if (e.target === document.getElementById('modal-overlay')) closeModal(); }

function openAddModal() {
  if (currentPage === 'clients') openAddClient();
  else openAddTrainer();
}

function openAddClient() {
  modalMode = 'add-client'; editingId = null;
  document.getElementById('modal-title').textContent = 'Новый клиент';
  document.getElementById('modal-body').innerHTML = clientForm({});
  openModal();
}

function openEditClient(id) {
  const c = allClients.find(x => x.id === id);
  if (!c) return;
  modalMode = 'edit-client'; editingId = id;
  document.getElementById('modal-title').textContent = 'Редактировать клиента';
  document.getElementById('modal-body').innerHTML = clientForm(c);
  openModal();
}

function clientForm(c) {
  return `<div class="form-grid">
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Фамилия <span class="req">*</span></label>
        <input class="form-control" id="f-surname" value="${c.surname||''}" placeholder="Иванов">
      </div>
      <div class="form-group">
        <label class="form-label">Имя <span class="req">*</span></label>
        <input class="form-control" id="f-name" value="${c.name||''}" placeholder="Иван">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Отчество</label>
      <input class="form-control" id="f-patronymic" value="${c.patronymic||''}" placeholder="Иванович">
    </div>
    <div class="form-group">
      <label class="form-label">Дата рождения <span class="req">*</span></label>
      <input class="form-control" id="f-birthday" type="date" value="${c.birthday||''}">
    </div>
    <div class="form-group">
      <label class="form-label">Телефон <span class="req">*</span></label>
      <input class="form-control" id="f-phone" value="${c.phone||''}" placeholder="+79001234567">
    </div>
    <div class="form-group">
      <label class="form-label">Email <span class="req">*</span></label>
      <input class="form-control" id="f-email" type="email" value="${c.email||''}" placeholder="ivan@example.com">
    </div>
    <div id="form-error" style="color:var(--danger);font-size:12px;display:none"></div>
  </div>`;
}

function openAddTrainer() {
  modalMode = 'add-trainer'; editingId = null;
  document.getElementById('modal-title').textContent = 'Новый тренер';
  document.getElementById('modal-body').innerHTML = trainerForm({});
  openModal();
}

function openEditTrainer(id) {
  const t = allTrainers.find(x => x.id === id);
  if (!t) return;
  modalMode = 'edit-trainer'; editingId = id;
  document.getElementById('modal-title').textContent = 'Редактировать тренера';
  document.getElementById('modal-body').innerHTML = trainerForm(t);
  openModal();
}

function trainerForm(t) {
  return `<div class="form-grid">
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Фамилия <span class="req">*</span></label>
        <input class="form-control" id="f-surname" value="${t.surname||''}" placeholder="Смирнов">
      </div>
      <div class="form-group">
        <label class="form-label">Имя <span class="req">*</span></label>
        <input class="form-control" id="f-name" value="${t.name||''}" placeholder="Алексей">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Отчество</label>
      <input class="form-control" id="f-patronymic" value="${t.patronymic||''}" placeholder="Игоревич">
    </div>
    <div class="form-group">
      <label class="form-label">Телефон <span class="req">*</span></label>
      <input class="form-control" id="f-phone" value="${t.phone||''}" placeholder="+79001234567">
    </div>
    <div id="form-error" style="color:var(--danger);font-size:12px;display:none"></div>
  </div>`;
}

function openAssignTrainer(clientId) {
  modalMode = 'assign-trainer'; editingId = clientId;
  document.getElementById('modal-title').textContent = 'Назначить тренера';
  const opts = allTrainers.map(t => `<option value="${t.id}">${fullName(t)} — ${t.status === 'WORKING' ? 'Работает' : t.status === 'ON_LEAVE' ? 'В отпуске' : 'Не работает'}</option>`).join('');
  document.getElementById('modal-body').innerHTML = `
    <div class="form-group">
      <label class="form-label">Выберите тренера</label>
      <select class="form-control" id="f-trainer-id">${opts}</select>
    </div>
  `;
  openModal();
}

function openChangeStatus(trainerId) {
  modalMode = 'change-status-trainer'; editingId = trainerId;
  const t = allTrainers.find(x => x.id === trainerId);
  document.getElementById('modal-title').textContent = 'Изменить статус тренера';
  document.getElementById('modal-body').innerHTML = `
    <div class="form-group">
      <label class="form-label">Статус</label>
      <select class="form-control" id="f-status">
        <option value="WORKING" ${t?.status==='WORKING'?'selected':''}>Работает</option>
        <option value="ON_LEAVE" ${t?.status==='ON_LEAVE'?'selected':''}>В отпуске</option>
        <option value="NOT_WORKING" ${t?.status==='NOT_WORKING'?'selected':''}>Не работает</option>
      </select>
    </div>
  `;
  openModal();
}

function val(id) { const el = document.getElementById(id); return el ? el.value.trim() : null; }

async function submitModal() {
  const btn = document.getElementById('modal-submit');
  btn.disabled = true; btn.textContent = 'Сохранение...';

  try {
    if (modalMode === 'add-client') {
      const body = { surname: val('f-surname'), name: val('f-name'), patronymic: val('f-patronymic') || undefined, birthday: val('f-birthday'), phone: val('f-phone'), email: val('f-email') };
      await api('POST', '/clients', body);
      toast('Клиент добавлен');
      await loadClients();
    } else if (modalMode === 'edit-client') {
      const body = { surname: val('f-surname'), name: val('f-name'), patronymic: val('f-patronymic') || null, birthday: val('f-birthday'), phone: val('f-phone'), email: val('f-email') };
      await api('PUT', `/clients/${editingId}`, body);
      toast('Клиент обновлён');
      await loadClients();
    } else if (modalMode === 'add-trainer') {
      const body = { surname: val('f-surname'), name: val('f-name'), patronymic: val('f-patronymic') || undefined, phone: val('f-phone') };
      await api('POST', '/trainers', body);
      toast('Тренер добавлен');
      await loadTrainers();
    } else if (modalMode === 'edit-trainer') {
      const body = { surname: val('f-surname'), name: val('f-name'), patronymic: val('f-patronymic') || null, phone: val('f-phone') };
      await api('PUT', `/trainers/${editingId}`, body);
      toast('Тренер обновлён');
      await loadTrainers();
    } else if (modalMode === 'assign-trainer') {
      const trainerId = document.getElementById('f-trainer-id').value;
      await api('POST', `/clients/${editingId}/trainer/${trainerId}`, {});
      toast('Тренер назначен');
      await loadAll();
      closeDetail();
    } else if (modalMode === 'change-status-trainer') {
      const status = document.getElementById('f-status').value;
      await api('PATCH', `/trainers/${editingId}/status`, { status });
      toast('Статус обновлён');
      await loadTrainers();
    }
    closeModal();
  } catch(e) {
    const errEl = document.getElementById('form-error');
    let msg = 'Ошибка сохранения';
    if (e.data) {
      if (e.data.details) msg = e.data.details.map(d => d.message).join(', ');
      else if (e.data.error) msg = e.data.error;
    }
    if (errEl) { errEl.textContent = msg; errEl.style.display = 'block'; }
    else toast(msg, 'error');
  } finally {
    btn.disabled = false; btn.textContent = 'Сохранить';
  }
}

// ── Client status toggle ───────────────────────────────────────────────────

async function toggleClientStatus(id, current) {
  try {
    await api('PATCH', `/clients/${id}/status`, { is_active: !current });
    toast(current ? 'Клиент деактивирован' : 'Клиент активирован');
    await loadClients();
  } catch(e) {
    toast('Ошибка', 'error');
  }
}

// ── Navigation ─────────────────────────────────────────────────────────────

function showPage(page) {
  currentPage = page;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.querySelector(`[data-page="${page}"]`).classList.add('active');
  const titles = { clients: 'Клиенты', trainers: 'Тренеры' };
  document.getElementById('topbar-title').textContent = titles[page];
  closeDetail();
}

// ── Init ───────────────────────────────────────────────────────────────────

loadAll();
</script>
